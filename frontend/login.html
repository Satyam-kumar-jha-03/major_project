<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALYTICS | Sign In</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --text-muted: #888888;
            --border-color: #2a2a2a;
            --accent: #d4af37;
            --accent-hover: #c0a030;
            --error: #f44336;
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #333333;
            --text-muted: #666666;
            --border-color: #d0d0d0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-secondary);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
        }

        .split-screen {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, var(--accent) 0%, #8B6914 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .left-content {
            text-align: center;
            color: #0a0a0a;
        }

        .left-content h1 {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .left-content p {
            font-size: 18px;
            opacity: 0.9;
        }

        .right-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--bg-primary);
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 450px;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-color);
        }
        .logo-image {
            height: 40px;
            width: auto;
            display: block;
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .divider span {
            background: var(--bg-secondary);
            padding: 0 12px;
            position: relative;
            font-size: 12px;
            color: var(--text-muted);
        }

        .social-buttons {
            display: flex;
            gap: 16px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .social-btn:hover {
            border-color: var(--accent);
        }

        .error {
            color: var(--error);
            font-size: 13px;
            margin-bottom: 16px;
        }

        .link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
        }

        .link a {
            color: var(--accent);
            text-decoration: none;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            z-index: 100;
        }
        @media (max-width: 768px) {
            .logo-image {
                height: 32px;
            }
            .logo-text {
                font-size: 16px;
            }
            .logo-text span {
                font-size: 10px;
            }
        }

        @media (max-width: 768px) {
            .split-screen {
                flex-direction: column;
            }
            .left-panel {
                padding: 60px 20px;
                min-height: 200px;
            }
            .left-content h1 {
                font-size: 32px;
            }
            .card {
                padding: 32px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
    
    <div class="split-screen">
        <div class="left-panel">
            <div class="left-content">
                <img src="/logo.png" alt="REALYTICS Logo" style="height: 80px; width: auto; margin-bottom: 20px;">
                <h1>REALYTICS</h1>
                <p>Enterprise Content Authentication</p>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="card">
                <h2>Welcome back</h2>
                <p class="subtitle">Sign in to access your dashboard</p>
                
                <div id="errorMsg" class="error"></div>
                
                <input type="email" id="email" placeholder="Email address" autocomplete="email">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password">
                <button class="btn" id="loginBtn">Sign in</button>
                
                <div class="divider">
                    <span>Or continue with</span>
                </div>
                
                <div class="social-buttons">
                    <button class="social-btn" id="googleBtn">
                        <span>G</span> Google
                    </button>
                    <button class="social-btn" id="githubBtn">
                        <span>GH</span> GitHub
                    </button>
                </div>
                
                <div class="link">
                    Don't have an account? <a href="/register">Create one</a>
                </div>
                <div class="link">
                    <a href="/">← Back to home</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.style.cssText = `position: fixed; bottom: 24px; right: 24px; background: var(--bg-secondary); border-left: 4px solid ${isError ? '#f44336' : '#4caf50'}; padding: 12px 20px; border-radius: 8px; z-index: 1100; animation: slideIn 0.3s ease;`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                document.body.setAttribute('data-theme', 'light');
                document.getElementById('themeToggle').innerHTML = '☀️ Light';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('themeToggle').innerHTML = '🌙 Dark';
            }
        }
        
        document.getElementById('themeToggle').addEventListener('click', () => {
            const current = document.body.getAttribute('data-theme');
            if (current === 'dark') {
                document.body.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                document.getElementById('themeToggle').innerHTML = '☀️ Light';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                document.getElementById('themeToggle').innerHTML = '🌙 Dark';
            }
        });
        
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                document.getElementById('errorMsg').textContent = 'Please enter email and password';
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showToast('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    document.getElementById('errorMsg').textContent = data.error || 'Login failed';
                }
            } catch (e) {
                document.getElementById('errorMsg').textContent = 'Network error. Please try again.';
            }
        });
        
        // Social login placeholders
        document.getElementById('googleBtn').addEventListener('click', () => {
            showToast('Google login coming soon. Use email for now.');
        });
        
        document.getElementById('githubBtn').addEventListener('click', () => {
            showToast('GitHub login coming soon. Use email for now.');
        });
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        
        initTheme();
    </script>
</body>
</html>
